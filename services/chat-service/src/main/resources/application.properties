spring.application.name=spawn-chat-service
server.port=8083

# Database (shared MySQL)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Monolith URL for Feign (user lookup)
services.monolith.url=${MONOLITH_URL:http://localhost:8080}

# Resilience4j
resilience4j.circuitbreaker.instances.monolith.register-health-indicator=true
resilience4j.circuitbreaker.instances.monolith.sliding-window-size=10
resilience4j.circuitbreaker.instances.monolith.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.monolith.wait-duration-in-open-state=30s
resilience4j.timelimiter.instances.monolith.timeout-duration=5s

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
